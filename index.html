<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxePark | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --accent: #2c3e50;
            --glass: rgba(255, 255, 255, 0.85);
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Same Animated Gradient as Dashboard */
            background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #e1f5fe, #f3e5f5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        /* Same Background Image Overlay as Dashboard */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920') center/cover no-repeat;
            opacity: 0.1;
            z-index: -1;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphic Login Card */
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            animation: fadeInUp 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            margin-left: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.9);
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4);
            opacity: 0.95;
        }

        button:active { transform: translateY(0); }

        #error {
            color: var(--danger);
            font-size: 13px;
            margin-top: 20px;
            font-weight: 500;
            min-height: 20px;
        }

        /* Shake animation for incorrect login */
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <div class="login-card" id="loginCard">
        <span class="brand-logo">🚗 LuxePark</span>
        <div class="subtitle">Smart Parking Management System</div>

        <div class="input-group">
            <label>Username</label>
            <input id="username" type="text" placeholder="Enter admin username" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter security pin">
        </div>

        <button onclick="login()">Access Dashboard</button>
        
        <p id="error"></p>
    </div>

    <script>
        function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const errorMsg = document.getElementById("error");
            const card = document.getElementById("loginCard");

            if (user === "admin" && pass === "1234") {
                errorMsg.style.color = "#27ae60";
                errorMsg.innerHTML = "Authentication Successful. Redirecting...";
                
                // Fancy button transition
                const btn = document.querySelector('button');
                btn.innerHTML = "Checking...";
                btn.style.background = "#27ae60";

                setTimeout(() => {
                    window.location.href = "dashboard.html"; // Ensure this matches your dashboard file name
                }, 1200);
            } else {
                errorMsg.innerHTML = "Invalid credentials. Please try again.";
                card.classList.remove("shake");
                void card.offsetWidth; // Trigger reflow
                card.classList.add("shake");
                
                // Clear password for security
                document.getElementById("password").value = "";
            }
        }

        // Enter key support
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { login(); }
        });
    </script>
</body>
</html>
