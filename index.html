<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxePark | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a90e2; --accent: #2c3e50; --glass: rgba(255, 255, 255, 0.85); --danger: #e74c3c; --success: #27ae60; }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #e1f5fe, #f3e5f5); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .auth-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 40px; width: 90%; max-width: 400px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); text-align: center; position: relative; overflow: hidden; }
        .auth-card h1 { color: var(--accent); margin-top: 0; margin-bottom: 5px; }
        .auth-card p { color: #666; margin-bottom: 25px; font-size: 14px; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 5px; font-weight: 600; }
        input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 14px; transition: border 0.3s; }
        input:focus { border-color: var(--primary); }

        button.btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button.btn-main:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4); }

        .toggle-link { margin-top: 20px; font-size: 13px; color: #666; }
        .toggle-link span { color: var(--primary); font-weight: 600; cursor: pointer; transition: 0.2s; }
        .toggle-link span:hover { text-decoration: underline; }

        /* Form Toggling */
        .form-section { display: none; animation: fadeIn 0.4s ease; }
        .form-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Toast */
        #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: 0.3s; pointer-events: none; white-space: nowrap; }
        #toast.success { background: var(--success); }
    </style>
</head>
<body>

    <div class="auth-card">
        <div id="toast">Message goes here</div>
        
        <div id="loginView" class="form-section active">
            <h1>LuxePark</h1>
            <p>Welcome back! Please enter your details.</p>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="loginUser" placeholder="Enter your username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPass" placeholder="••••••••">
            </div>
            
            <button class="btn-main" onclick="handleLogin()">Sign In</button>
            <div class="toggle-link">Don't have an account? <span onclick="toggleView('registerView')">Sign up</span></div>
        </div>

        <div id="registerView" class="form-section">
            <h1>Create Account</h1>
            <p>Set up a new staff or admin profile.</p>
            
            <div class="input-group">
                <label>New Username</label>
                <input type="text" id="regUser" placeholder="Choose a username">
            </div>
            <div class="input-group">
                <label>Create Password</label>
                <input type="password" id="regPass" placeholder="Create a strong password">
            </div>
            
            <button class="btn-main" onclick="handleRegister()">Register Account</button>
            <div class="toggle-link">Already have an account? <span onclick="toggleView('loginView')">Sign in</span></div>
        </div>
    </div>

    <script>
        // Initialize our "Database"
        // If it's the first time, we create a default admin account
        if (!localStorage.getItem('luxepark_users')) {
            const defaultUser = { "admin": "admin123" };
            localStorage.setItem('luxepark_users', JSON.stringify(defaultUser));
        }

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.className = type === 'success' ? 'success' : '';
            toast.style.opacity = '1';
            toast.style.top = '10px';
            setTimeout(() => { toast.style.opacity = '0'; toast.style.top = '20px'; }, 3000);
        }

        function toggleView(viewId) {
            document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            // Clear inputs when switching
            document.querySelectorAll('input').forEach(input => input.value = '');
        }

        function handleRegister() {
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value.trim();

            if (!user || !pass) return showToast("Please fill in all fields");

            // Fetch existing users from Local Storage
            const usersDB = JSON.parse(localStorage.getItem('luxepark_users'));

            if (usersDB[user]) {
                return showToast("Username already exists!");
            }

            // Save new user
            usersDB[user] = pass;
            localStorage.setItem('luxepark_users', JSON.stringify(usersDB));
            
            showToast("Account created! Please Sign In.", "success");
            setTimeout(() => toggleView('loginView'), 1500);
        }

        function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!user || !pass) return showToast("Please enter username and password");

            const usersDB = JSON.parse(localStorage.getItem('luxepark_users'));

            // Verify credentials
            if (usersDB[user] && usersDB[user] === pass) {
                // Save the active session
                sessionStorage.setItem('active_user', user);
                showToast("Login successful! Redirecting...", "success");
                
                // Redirect to dashboard (Change 'index.html' if your dashboard is named something else)
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
            } else {
                showToast("Invalid username or password");
            }
        }
    </script>
</body>
</html>
