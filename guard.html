<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxePark | Security Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a90e2; --accent: #2c3e50; --success: #27ae60; --danger: #e74c3c; --glass: rgba(255, 255, 255, 0.85); }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background: linear-gradient(-45deg, #141e30, #243b55); color: white; }
        
        /* Header */
        header { width: 100%; padding: 20px; background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 20px; color: #4a90e2; }
        .logout-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* Main Scanner Area */
        .scanner-container { width: 90%; max-width: 500px; margin-top: 40px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #4a90e2; background: black; }
        
        /* Results Box */
        .result-box { margin-top: 20px; padding: 20px; border-radius: 15px; display: none; background: white; color: var(--accent); transition: all 0.3s ease; }
        .result-box.active { display: block; animation: popIn 0.3s ease; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .status-icon { font-size: 50px; margin-bottom: 10px; }
        .valid { border-top: 5px solid var(--success); }
        .valid .status-icon { color: var(--success); }
        .invalid { border-top: 5px solid var(--danger); }
        .invalid .status-icon { color: var(--danger); }

        .scan-again-btn { background: var(--primary); color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 15px; cursor: pointer; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>LuxePark <span style="color: white; font-weight: 300;">| Scanner</span></h1>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </header>

    <div class="scanner-container">
        <h2 style="margin-top: 0;">Scan Parking Pass</h2>
        <p style="font-size: 14px; color: #ccc; margin-bottom: 20px;">Point camera at the customer's QR code.</p>
        
        <div id="reader"></div>

        <div id="resultBox" class="result-box">
            <div id="statusIcon" class="status-icon">✅</div>
            <h2 id="statusTitle" style="margin: 0;">Valid Pass</h2>
            <p id="bookingIdDisplay" style="font-family: monospace; font-size: 18px; color: #888; margin: 5px 0;">LX-00000</p>
            <div id="detailsBox" style="background: #f4f7f6; padding: 10px; border-radius: 8px; margin-top: 15px; text-align: left; font-size: 14px;">
                </div>
            <button class="scan-again-btn" onclick="resetScanner()">Scan Next Vehicle</button>
        </div>
    </div>

    <script>
        // Security Check
        if (!sessionStorage.getItem('active_user')) {
            window.location.href = "index.html";
        }

        const API_BASE = "https://parking-backend-ec5m.onrender.com";
        let html5QrcodeScanner;

        // Initialize the scanner
        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { fps: 10, qrbox: {width: 250, height: 250} },
                /* verbose= */ false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        // What happens when a QR is successfully read
        function onScanSuccess(decodedText, decodedResult) {
            // Stop scanning temporarily
            html5QrcodeScanner.pause();
            
            // The decodedText should be our Booking ID (e.g., "LX-12345")
            verifyBooking(decodedText);
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning
        }

        function verifyBooking(scannedId) {
            // Fetch live reservations from backend to check if the ID is valid and active
            fetch(`${API_BASE}/reservations`)
                .then(res => res.json())
                .then(data => {
                    const foundReservation = data.find(r => r.booking_id === scannedId);
                    displayResult(foundReservation, scannedId);
                })
                .catch(e => {
                    alert("Network Error: Could not reach server to verify pass.");
                    html5QrcodeScanner.resume();
                });
        }

        function displayResult(reservation, scannedId) {
            const resultBox = document.getElementById('resultBox');
            const statusIcon = document.getElementById('statusIcon');
            const statusTitle = document.getElementById('statusTitle');
            const bookingIdDisplay = document.getElementById('bookingIdDisplay');
            const detailsBox = document.getElementById('detailsBox');

            bookingIdDisplay.innerText = scannedId;
            resultBox.classList.remove('valid', 'invalid');

            if (reservation) {
                // Pass is VALID
                resultBox.classList.add('valid');
                statusIcon.innerText = "✅";
                statusTitle.innerText = "Access Granted";
                statusTitle.style.color = "var(--success)";
                
                let paymentText = reservation.payment_method === 'Cash' 
                    ? `<strong style="color:var(--danger)">Collect Cash: ₹${reservation.price}</strong>` 
                    : `<strong style="color:var(--success)">Paid via UPI</strong>`;

                detailsBox.innerHTML = `
                    <b>Vehicle:</b> ${reservation.vehicle_no || "N/A"}<br>
                    <b>Slot Assigned:</b> ${reservation.slot}<br>
                    <b>Time:</b> ${reservation.start} - ${reservation.end}<br>
                    <hr style="border:0; border-top:1px solid #ddd; margin: 10px 0;">
                    ${paymentText}
                `;
            } else {
                // Pass is INVALID or EXPIRED
                resultBox.classList.add('invalid');
                statusIcon.innerText = "❌";
                statusTitle.innerText = "Access Denied";
                statusTitle.style.color = "var(--danger)";
                detailsBox.innerHTML = `This pass is invalid, expired, or was cancelled. Do not allow entry.`;
            }

            // Hide the camera, show the result
            document.getElementById('reader').style.display = 'none';
            resultBox.classList.add('active');
        }

        function resetScanner() {
            document.getElementById('resultBox').classList.remove('active');
            document.getElementById('reader').style.display = 'block';
            html5QrcodeScanner.resume();
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        // Start scanner when page loads
        window.onload = startScanner;
    </script>
</body>
</html>
