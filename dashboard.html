<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxePark | Smart Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f4f7f6;
            --accent: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { margin: 0; min-height: 100vh; display: flex; background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #e1f5fe, #f3e5f5); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .sidebar { width: 260px; background: var(--glass); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.3); display: flex; flex-direction: column; padding: 30px 20px; box-shadow: 4px 0 15px rgba(0,0,0,0.05); z-index: 10; flex-shrink: 0; }
        .sidebar h1 { font-size: 22px; color: var(--accent); margin-bottom: 40px; text-align: center; }
        .nav-item { padding: 15px 20px; margin: 8px 0; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; color: #666; font-weight: 500; }
        .nav-item:hover { background: rgba(74, 144, 226, 0.1); color: var(--primary); }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; position: relative; }
        .section { display: none; animation: fadeIn 0.5s ease forwards; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); }

        .parking-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; }
        .slot-card { text-align: center; padding: 25px; transition: transform 0.3s ease; }
        .slot-status { font-size: 28px; font-weight: 600; margin: 10px 0; }
        .stats-banner { display: flex; justify-content: space-around; margin-bottom: 30px; text-align: center; }
        .stat-item span { display: block; font-size: 24px; font-weight: 600; color: var(--primary); }

        /* Payment Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 999; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .payment-box { width: 100%; max-width: 400px; text-align: center; }
        .payment-box h2 { margin-top: 0; color: var(--accent); }
        .price-tag { font-size: 32px; font-weight: bold; color: var(--primary); margin: 15px 0; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 15px; flex-direction: row; flex-wrap: wrap; justify-content: center; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.2); }
            .sidebar h1 { width: 100%; margin-bottom: 10px; font-size: 18px; }
            .nav-item { padding: 8px 12px; margin: 4px; font-size: 12px; }
            .main-content { padding: 20px; }
            .stats-banner { flex-direction: row; flex-wrap: wrap; gap: 10px; }
            .stat-item { flex: 1; min-width: 80px; font-size: 12px; }
            .stat-item span { font-size: 18px; }
        }

        input, select, button { padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 16px; margin-top: 15px;}
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-cancel { background: var(--danger); }
        .logout-btn { background: #fdf2f2; color: var(--danger); border: 1px solid #fee2e2; }

        .res-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.6); border-radius: 10px; margin-bottom: 10px; border: 1px solid #eee; }
        
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--accent); color: white; padding: 12px 20px; border-radius: 10px; animation: slideIn 0.3s ease forwards; font-size: 14px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h1>LuxePark</h1>
        <div class="nav-item active" onclick="showSection('live')">Live</div>
        <div class="nav-item" onclick="showSection('analytics')">Analytics</div>
        <div class="nav-item" onclick="showSection('reserve')">Reserve</div>
        <button class="logout-btn" onclick="logout()">Sign Out</button>
    </nav>

    <main class="main-content">
        <section id="live" class="section active">
            <div class="glass-card stats-banner">
                <div class="stat-item">Total <span>02</span></div>
                <div class="stat-item">Free <span id="freeCount" style="color: var(--success)">0</span></div>
                <div class="stat-item">Busy <span id="occCount" style="color: var(--danger)">0</span></div>
            </div>
            <div class="glass-card">
                <h2>Live Slots</h2>
                <div class="parking-grid">
                    <div class="glass-card slot-card">
                        <h3>Slot 01</h3>
                        <div id="status1" class="slot-status">...</div>
                        <div id="distance1" style="color: #888"></div>
                    </div>
                    <div class="glass-card slot-card">
                        <h3>Slot 02</h3>
                        <div id="status2" class="slot-status">...</div>
                        <div id="distance2" style="color: #888"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="analytics" class="section">
            <div class="glass-card">
                <h2>Occupancy</h2>
                <div style="max-width: 300px; margin: auto;"><canvas id="parkingChart"></canvas></div>
            </div>
            <div class="glass-card">
                <h2>24h History</h2>
                <canvas id="historyChart" height="150"></canvas>
            </div>
        </section>

        <section id="reserve" class="section">
            <div class="glass-card">
                <h2>Book Space</h2>
                <div style="display: flex; flex-direction: column;">
                    <label>Select Slot</label>
                    <select id="slot"><option value="1">Slot 1</option><option value="2">Slot 2</option></select>
                    
                    <label>Start Time</label>
                    <input type="time" id="start" onchange="calculatePrice()">
                    
                    <label>End Time</label>
                    <input type="time" id="end" onchange="calculatePrice()">
                    
                    <div style="background: rgba(74, 144, 226, 0.1); padding: 15px; border-radius: 8px; margin-top: 15px; text-align: center;">
                        <span style="color: #666; font-size: 14px;">Rate: ₹50 / Hour</span><br>
                        <strong id="priceDisplay" style="font-size: 20px; color: var(--primary);">Total: ₹0.00</strong>
                    </div>

                    <button onclick="initiateBooking()">Proceed to Payment</button>
                </div>
            </div>
            <div class="glass-card">
                <h2>Active Bookings</h2>
                <div id="reservationList"></div>
            </div>
        </section>
    </main>

    <div id="paymentModal" class="modal-overlay">
        <div class="glass-card payment-box">
            <h2>Secure Checkout</h2>
            <div id="modalPrice" class="price-tag">₹0.00</div>
            <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Enter simulation details below</p>
            
            <input type="text" placeholder="Card Number (e.g. 4242 4242...)" maxlength="16">
            <div style="display: flex; gap: 10px;">
                <input type="text" placeholder="MM/YY" maxlength="5">
                <input type="text" placeholder="CVV" maxlength="3">
            </div>
            
            <button onclick="processPayment()">Pay & Confirm Booking</button>
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const API_BASE = "https://parking-backend-ec5m.onrender.com";
        let currentReservations = [];
        let slot1Status = "FREE";
        let slot2Status = "FREE";
        let calculatedFinalPrice = 0; 

        // --- UI Navigation & Setup ---
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function showToast(message) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        var historyCtx = document.getElementById('historyChart').getContext('2d');
        var historyChart = new Chart(historyCtx, {
            type: 'line', data: { labels: [], datasets: [{ label: 'Occupied', data: [], borderColor: '#4a90e2', fill: true, tension: 0.4 }] }, options: { responsive: true }
        });
        var ctx = document.getElementById('parkingChart').getContext('2d');
        var parkingChart = new Chart(ctx, {
            type: 'doughnut', data: { labels: ['Free', 'Occupied'], datasets: [{ data: [0, 0], backgroundColor: ['#27ae60', '#e74c3c'] }] }, options: { cutout: '70%' }
        });

        // --- Fetch Hardware Data ---
        function updateData() {
            fetch(`${API_BASE}/data`).then(res => res.json()).then(data => {
                document.getElementById("distance1").innerText = data.distance1 + " cm";
                document.getElementById("distance2").innerText = data.distance2 + " cm";
                
                const s1 = document.getElementById("status1");
                const s2 = document.getElementById("status2");
                
                s1.innerText = data.status1; s1.style.color = data.status1 === "FREE" ? "#27ae60" : "#e74c3c";
                s2.innerText = data.status2; s2.style.color = data.status2 === "FREE" ? "#27ae60" : "#e74c3c";
                
                slot1Status = data.status1;
                slot2Status = data.status2;

                let free = (data.status1 === "FREE" ? 1 : 0) + (data.status2 === "FREE" ? 1 : 0);
                let occ = 2 - free;
                document.getElementById("freeCount").innerText = free;
                document.getElementById("occCount").innerText = occ;
                
                parkingChart.data.datasets[0].data = [free, occ];
                parkingChart.update();
            }).catch(e => console.log("Fetch error"));
        }

        // --- Pricing Calculation ---
        function calculatePrice() {
            let start = document.getElementById("start").value;
            let end = document.getElementById("end").value;
            if (start && end) {
                let [startHour, startMin] = start.split(':').map(Number);
                let [endHour, endMin] = end.split(':').map(Number);
                let duration = (endHour + endMin/60) - (startHour + startMin/60);
                if (duration > 0) {
                    calculatedFinalPrice = (duration * 50).toFixed(2);
                    document.getElementById("priceDisplay").innerText = `Total: ₹${calculatedFinalPrice}`;
                    return;
                }
            }
            calculatedFinalPrice = 0;
            document.getElementById("priceDisplay").innerText = `Total: ₹0.00`;
        }

        // --- Payment & Booking Flow ---
        function initiateBooking() {
            let slot = document.getElementById("slot").value;
            let start = document.getElementById("start").value;
            let end = document.getElementById("end").value;

            if (!start || !end) { showToast("Please select Start and End times."); return; }
            if (calculatedFinalPrice <= 0) { showToast("End time must be after Start time."); return; }
            if (slot === "1" && slot1Status !== "FREE") { showToast("Cannot book: Slot 1 is currently occupied."); return; }
            if (slot === "2" && slot2Status !== "FREE") { showToast("Cannot book: Slot 2 is currently occupied."); return; }

            document.getElementById("modalPrice").innerText = `₹${calculatedFinalPrice}`;
            document.getElementById("paymentModal").classList.add("active");
        }

        function closeModal() { document.getElementById("paymentModal").classList.remove("active"); }

        function processPayment() {
            showToast("Processing Payment...");
            document.querySelector(".payment-box button").innerText = "Processing...";
            
            setTimeout(() => {
                let slot = document.getElementById("slot").value;
                let start = document.getElementById("start").value;
                let end = document.getElementById("end").value;

                fetch(`${API_BASE}/reserve`, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ slot, start, end, price: calculatedFinalPrice })
                }).then(() => { 
                    closeModal();
                    document.querySelector(".payment-box button").innerText = "Pay & Confirm Booking";
                    showToast(`Payment Successful! Slot ${slot} reserved.`); 
                    loadReservations(); 
                }).catch(() => showToast("Network Error."));
            }, 1500); 
        }

        // --- Reservation Management (Fixed UI) ---
        function loadReservations() {
            fetch(`${API_BASE}/reservations`).then(res => res.json()).then(data => {
                currentReservations = data;
                renderReservationList();
            });
        }

        function renderReservationList() {
            const list = document.getElementById("reservationList");
            if (currentReservations.length === 0) {
                list.innerHTML = "<p style='color: #888;'>No active bookings</p>";
                return;
            }
            
            // Re-added the Delete button here!
            list.innerHTML = currentReservations.map((r, index) => `
                <div class="res-item">
                    <div><b>Slot ${r.slot}</b>: ${r.start} - ${r.end} <br><small>Paid: ₹${r.price || 'N/A'}</small></div>
                    <button class="del-btn" onclick="manualDelete(${index})">Delete</button>
                </div>
            `).join('');
        }

        // --- Manual Delete Logic ---
        function manualDelete(index) {
            const res = currentReservations[index];
            currentReservations.splice(index, 1);
            renderReservationList(); // Update UI instantly
            showToast(`Cancelled reservation for Slot ${res.slot}`);

            fetch(`${API_BASE}/delete_reservation`, { 
                method: "POST", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(res)
            });
        }

        // --- Local Time Auto-Expiration (Fixed Timezone issue) ---
        function checkExpirationsRealTime() {
            const now = new Date(); // Gets the local time on your phone/PC
            const currentHours = now.getHours();
            const currentMinutes = now.getMinutes();

            for (let i = currentReservations.length - 1; i >= 0; i--) {
                const res = currentReservations[i];
                const [endHours, endMinutes] = res.end.split(':').map(Number);
                
                if (currentHours > endHours || (currentHours === endHours && currentMinutes >= endMinutes)) {
                    showToast(`Time's up! Slot ${res.slot} reservation expired.`);
                    currentReservations.splice(i, 1);
                    renderReservationList(); // Remove from screen

                    // Tell backend to delete it
                    fetch(`${API_BASE}/delete_reservation`, { 
                        method: "POST", 
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(res)
                    }); 
                }
            }
        }

        function logout() {
            localStorage.clear(); sessionStorage.clear();
            showToast("Signed out successfully.");
            setTimeout(() => { window.location.href = "index.html"; }, 1000);
        }

        // --- Initialization & Timers ---
        setInterval(updateData, 3000);
        setInterval(loadReservations, 15000); // Fetch from backend every 15s
        setInterval(checkExpirationsRealTime, 5000); // Check for expiration every 5s locally
        updateData(); 
        loadReservations();
    </script>
</body>
</html>
